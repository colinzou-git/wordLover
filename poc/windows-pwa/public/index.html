<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#256d85" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>WordLover PWA POC</title>
  </head>
  <body>
    <main id="app">
      <section class="hero">
        <div>
          <p class="eyebrow">Windows PWA feasibility</p>
          <h1>WordLover local dictionary POC</h1>
        </div>
        <div id="pwaStatus" class="status-pill">Checking offline shell...</div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <button id="loadDictionary" type="button">Load local SQLite dictionary</button>
          <button id="exportState" type="button">Export user data</button>
          <a class="button-link" href="/poc-suite.html">Phase 0 POC suite</a>
        </div>
        <div id="metrics" class="metrics"></div>
      </section>

      <section class="panel">
        <h2>Device and PWA diagnostics</h2>
        <div id="diagnostics" class="metrics"></div>
      </section>

      <section class="search-surface">
        <label for="termInput">Search word or phrase</label>
        <input id="termInput" autocomplete="off" placeholder="abandon, take off, in terms of" />
        <div id="result" class="result" aria-live="polite"></div>
      </section>

      <section class="panel">
        <h2>Recent valid searches</h2>
        <ol id="history"></ol>
      </section>
    </main>
    <script src="/vendor/sql-wasm.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
