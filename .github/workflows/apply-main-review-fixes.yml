name: Apply main review fixes

on:
  push:
    branches:
      - fix/main-review-20260618
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: >-
      github.actor != 'github-actions[bot]' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/fix/main-review-20260618') ||
       (github.event_name == 'pull_request' && github.head_ref == 'fix/main-review-20260618'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/main-review-20260618
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/wordlover-pwa/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply reviewed runtime fixes
        run: |
          python scripts/apply_main_review_fixes.py
          python apps/wordlover-pwa/scripts/bump_version.py

      - name: Remove temporary patch runner
        run: |
          rm .github/workflows/apply-main-review-fixes.yml
          rm scripts/apply_main_review_fixes.py

      - name: Regenerate symbol map
        run: python scripts/generate_code_map.py

      - name: Install JavaScript dependencies
        working-directory: apps/wordlover-pwa
        run: npm ci

      - name: Run PWA static and regression tests
        working-directory: apps/wordlover-pwa
        run: npm test

      - name: Run Python tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Run full dictionary client tests
        run: node apps/wordlover-pwa/scripts/test-full-dictionary.mjs

      - name: Verify generated symbol map and diff
        run: |
          python scripts/generate_code_map.py --check
          git diff --check

      - name: Commit validated fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && { echo 'No generated changes to commit'; exit 1; }
          git commit -m 'Fix regressions found in main branch audit'
          git push origin HEAD:fix/main-review-20260618
