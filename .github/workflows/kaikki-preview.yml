name: Build Kaikki fixture preview artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/kaikki-dictionary-preview

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install preview packaging dependency
        run: python -m pip install --upgrade zstandard

      - name: Install validation dependencies
        working-directory: apps/wordlover-pwa
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run tests
        run: |
          cd apps/wordlover-pwa
          npm test
          cd ../..
          python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Build isolated fixture preview dictionary
        run: |
          PREPARED="$RUNNER_TEMP/kaikki-prepared"
          python apps/wordlover-pwa/scripts/create-ci-dictionary.py \
            --output-dir "$PREPARED" \
            --work-dir "$RUNNER_TEMP/kaikki-work" \
            --version "kaikki-preview-${GITHUB_RUN_NUMBER}"
          python scripts/build_kaikki_preview.py --source-dir "$PREPARED"

      - name: Stage preview artifact
        run: |
          ARTIFACT_ROOT="$RUNNER_TEMP/kaikki-preview-artifact"
          mkdir -p "$ARTIFACT_ROOT/public"
          rsync -a apps/wordlover-pwa/public/ "$ARTIFACT_ROOT/public/"

      - name: Upload preview site
        uses: actions/upload-artifact@v4
        with:
          name: wordfan-kaikki-preview-${{ github.run_number }}
          path: ${{ runner.temp }}/kaikki-preview-artifact/
          compression-level: 0
          retention-days: 14
          if-no-files-found: error

      - name: Write preview instructions
        run: |
          {
            echo "## Kaikki fixture preview artifact"
            echo
            echo "Artifact: \`wordfan-kaikki-preview-${GITHUB_RUN_NUMBER}\`"
            echo
            echo "Scope: fixture dictionary generated in CI. This validates isolated preview packaging and UI wiring; it is not the real full Kaikki build."
            echo
            echo "Download and extract the artifact, then run:"
            echo '```bash'
            echo 'python -m http.server 4173 --directory public'
            echo '```'
            echo
            echo "Open: http://127.0.0.1:4173/?dictionary=kaikki-preview&fresh=latest"
            echo
            echo "This workflow does not write to \`gh-pages\` or production dictionary paths."
            echo
            echo "For real full Kaikki validation, run the documented local build and audit commands with the full JSONL and current WordFan SQLite/full-shard overlays."
          } >> "$GITHUB_STEP_SUMMARY"
