name: Validate full dictionary symbol map

on:
  workflow_dispatch:

# Keep this workflow read-only. It remains laid out like the original generated
# symbol-map entry so CI's map staleness check does not require a doc rewrite.
permissions:
  contents: read

concurrency:
  group: validate-full-dictionary-symbol-map
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-dictionary-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check symbol map
        run: python scripts/generate_code_map.py --check
