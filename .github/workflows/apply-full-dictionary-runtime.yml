name: Apply full dictionary runtime integration

on:
  push:
    branches:
      - feat/full-dictionary-runtime
    paths:
      - scripts/apply_full_dictionary_runtime.py
      - .github/workflows/apply-full-dictionary-runtime.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-dictionary-runtime
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply strict source patch
        run: python scripts/apply_full_dictionary_runtime.py

      - name: Generate current symbol map
        run: python scripts/generate_code_map.py

      - name: Validate generated source
        run: |
          set -euo pipefail
          node --check apps/wordlover-pwa/public/app.js
          node --check apps/wordlover-pwa/public/full-dictionary.js
          node --check apps/wordlover-pwa/public/sw.js
          python -m unittest scripts.tests.test_package_dictionary_shards
          node apps/wordlover-pwa/scripts/test-full-dictionary.mjs
          python apps/wordlover-pwa/scripts/check_versions.py
          (cd apps/wordlover-pwa && npm run validate:shell-assets)
          git diff --check

      - name: Commit integrated runtime
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No integration changes to commit."
            exit 0
          fi
          git commit -m "feat: integrate sharded full dictionary runtime"
          git push origin HEAD:feat/full-dictionary-runtime
