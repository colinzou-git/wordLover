name: Validate full dictionary symbol map

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-dictionary-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check symbol map
        run: python scripts/generate_code_map.py --check
