name: Refresh full dictionary symbol map

on:
  push:
    branches:
      - feat/full-dictionary-runtime
    paths:
      - .github/workflows/apply-full-dictionary-runtime.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-full-dictionary-symbol-map
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-dictionary-runtime
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate symbol map from exact PR head
        run: python scripts/generate_code_map.py

      - name: Commit refreshed symbol map
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ai/AUTO_SYMBOL_MAP.md
          if git diff --cached --quiet; then
            echo "Symbol map is already current."
            exit 0
          fi
          git commit -m "docs: refresh symbol map for full dictionary runtime"
          git push origin HEAD:feat/full-dictionary-runtime
