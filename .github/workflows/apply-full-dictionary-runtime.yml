name: Validate full dictionary symbol map

on:
  workflow_dispatch:

# Read-only replacement for the old write-enabled maintenance workflow.
# Keep these padding comments so generated symbol-map line anchors stay stable.
# The workflow validates only; it never commits or pushes source changes.
# If this layout changes, regenerate docs/ai/AUTO_SYMBOL_MAP.md.
# Padding line for the generated map anchor.
permissions:
  contents: read

concurrency:
  group: validate-full-dictionary-symbol-map
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-dictionary-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check symbol map
        run: python scripts/generate_code_map.py --check
