name: Update symbol map once

on:
  push:
    branches:
      - fix/phrase-spelling-spaces

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phrase-spelling-spaces
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate and commit
        run: |
          rm .github/workflows/update-symbol-map-once.yml
          python scripts/generate_code_map.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate symbol map"
          git push origin HEAD:fix/phrase-spelling-spaces
