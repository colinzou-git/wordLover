name: Apply post-merge audit fixes

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-post-merge-audit-fixes
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/post-merge-full-dictionary-audit
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Correct one-shot generator closure
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/apply_post_merge_audit_fixes.py")
          text = path.read_text(encoding="utf-8")
          old = 'replace_between(text, "  async removeOfflineCopy()", "}\\n\\nexport function createFullDictionaryClient", remove_fn + "\\n}", "offline removal")'
          new = 'replace_between(text, "  async removeOfflineCopy()", "}\\n\\nexport function createFullDictionaryClient", remove_fn, "offline removal")'
          if old not in text:
              raise SystemExit("Expected closure generator line was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Apply strict audit patch
        run: python scripts/apply_post_merge_audit_fixes.py

      - name: Align generated audit fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          shard_path = Path("scripts/package_dictionary_shards.py")
          shard_text = shard_path.read_text(encoding="utf-8")
          old_router = "def shard_index(value: str, shard_count: int) -> int:\n    return fnv1a32(value) % shard_count\n"
          new_router = "def shard_index(value: str, shard_count: int) -> int:\n    return fnv1a32(normalize_word(value)) % shard_count\n"
          if old_router not in shard_text:
              raise SystemExit("Expected Python shard router was not found")
          shard_path.write_text(shard_text.replace(old_router, new_router, 1), encoding="utf-8")

          test_path = Path("apps/wordlover-pwa/scripts/test-full-dictionary.mjs")
          test_text = test_path.read_text(encoding="utf-8")
          old_crypto = "const noCryptoClient = createFullDictionaryClient({ ...options, cryptoApi: null, cachesApi: new MemoryCaches(), storage: new MemoryStorage() });"
          new_crypto = "const noCryptoClient = createFullDictionaryClient({ ...options, cryptoApi: {}, cachesApi: new MemoryCaches(), storage: new MemoryStorage() });"
          if old_crypto not in test_text:
              raise SystemExit("Expected no-WebCrypto test setup was not found")
          test_path.write_text(test_text.replace(old_crypto, new_crypto, 1), encoding="utf-8")
          PY

      - name: Regenerate symbol map
        run: python scripts/generate_code_map.py

      - name: Run static and unit tests
        run: |
          set -o pipefail
          {
            set -euo pipefail
            node --check apps/wordlover-pwa/public/app.js
            node --check apps/wordlover-pwa/public/full-dictionary.js
            node --check apps/wordlover-pwa/public/sw.js
            python -m unittest discover -s scripts/tests -p 'test_*.py'
            node apps/wordlover-pwa/scripts/test-full-dictionary.mjs
            python apps/wordlover-pwa/scripts/check_versions.py
            (cd apps/wordlover-pwa && npm run validate:shell-assets)
            git diff --check
          } 2>&1 | tee post-merge-audit-tests.log

      - name: Upload audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-audit-diagnostics-${{ github.run_number }}
          path: post-merge-audit-tests.log
          if-no-files-found: warn

      - name: Commit fixes and tests
        run: |
          set -o pipefail
          {
            set -euo pipefail
            git restore --source=HEAD -- .github/workflows/apply-post-merge-audit-fixes.yml
            git status --short
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --stat
            git commit -m "fix: harden full dictionary runtime after merge audit"
            git push origin HEAD:fix/post-merge-full-dictionary-audit
          } 2>&1 | tee post-merge-audit-commit.log

      - name: Upload commit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-audit-commit-${{ github.run_number }}
          path: post-merge-audit-commit.log
          if-no-files-found: warn
