name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  static-checks:
    name: JS syntax + cache-version lockstep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check shell JavaScript
        working-directory: apps/wordlover-pwa
        run: node scripts/check-js-syntax.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify cache-version lockstep
        run: python apps/wordlover-pwa/scripts/check_versions.py

      - name: Test dictionary build, package, and client code
        run: |
          python -m unittest discover -s scripts/tests -p 'test_*.py'
          node apps/wordlover-pwa/scripts/test-full-dictionary.mjs

      - name: Check symbol map is up to date
        run: |
          set -euo pipefail
          changed="$(git diff --name-only HEAD^1 HEAD)"
          if [ "$changed" = ".github/workflows/ci.yml" ]; then
            echo "Only the CI workflow changed; no symbol-bearing source changed."
            exit 0
          fi
          python scripts/generate_code_map.py --check

      - name: Validate public shell assets
        working-directory: apps/wordlover-pwa
        run: npm run validate:shell-assets

  smoke:
    name: Headless app-shell smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (Chromium)
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright zstandard
          python -m playwright install --with-deps chromium

      - name: Prepare lightweight CI dictionary
        run: python apps/wordlover-pwa/scripts/create-ci-dictionary.py --force

      - name: Serve the PWA over HTTP
        working-directory: apps/wordlover-pwa/public
        run: |
          python -m http.server 4173 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null; then echo "server up"; break; fi
            sleep 1
          done

      - name: Run headless smoke test
        run: >
          python apps/wordlover-pwa/scripts/smoke-headless.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/smoke-report.json

      - name: Run browser automated suite
        run: >
          python apps/wordlover-pwa/scripts/run-browser-tests.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/browser-report.json

      - name: Run full dictionary browser smoke
        run: >
          python apps/wordlover-pwa/scripts/smoke-full-dictionary.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/full-dictionary-report.json

      - name: Run offline / cold-start regression suite
        run: python apps/wordlover-pwa/scripts/smoke-offline-dictionary.py http://127.0.0.1:4173

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: apps/wordlover-pwa/test-results/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages (gh-pages)
    needs: [static-checks, smoke]
    # Only after checks pass, only for main (push or manual re-deploy).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (shell from main + dictionary carried from gh-pages)
        run: |
          set -euo pipefail
          SRC=apps/wordlover-pwa/public
          SITE="$RUNNER_TEMP/site"
          rm -rf "$SITE"; mkdir -p "$SITE"

          # Web shell only — drop dev launchers, build scripts, docs and certs.
          rsync -a \
            --exclude='*.ps1' --exclude='*.py' --exclude='*.md' \
            --exclude='*.pem' --exclude='*.cer' --exclude='certs/' \
            "$SRC"/ "$SITE"/

          # The ~32 MB ranked core dictionary is gitignored on main and lives on gh-pages.
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git show origin/gh-pages:dictionary.sqlite     > "$SITE/dictionary.sqlite"
          git show origin/gh-pages:dictionary.sqlite.zst > "$SITE/dictionary.sqlite.zst"

          # Preserve and revalidate the separately-published sharded full dictionary.
          if git ls-tree -d --name-only origin/gh-pages dictionary-full | grep -q '^dictionary-full$'; then
            git archive origin/gh-pages dictionary-full | tar -x -C "$SITE"
            python scripts/validate_dictionary_shards.py "$SITE/dictionary-full"
          fi

          # GitHub Pages config.
          tr -d '\n' < CNAME > "$SITE/CNAME"
          : > "$SITE/.nojekyll"

      - name: Verify carried dictionary matches the manifest on main
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          MAN="$SITE/dictionary-manifest.json"
          for key in sqlite zstd; do
            file=$(jq -r ".$key.path"   "$MAN")
            want=$(jq -r ".$key.sha256" "$MAN")
            got=$(sha256sum "$SITE/$file" | cut -d' ' -f1)
            if [ "$want" != "$got" ]; then
              echo "::error::$file sha256 mismatch: manifest on main expects $want, dictionary on gh-pages is $got."
              echo "The dictionary content changed but CI cannot rebuild the ranked core set."
              echo "Publish the new binary once from the Windows box, then re-push:"
              echo "  powershell -File apps/wordlover-pwa/scripts/deploy-github-pages.ps1"
              exit 1
            fi
          done
          echo "Dictionary matches manifest ($(jq -r .dictionaryDataVersion "$MAN"))."

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          cd "$SITE"
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Deploy WordFan from ${GITHUB_SHA:0:7}"
          # Single orphan commit (force) prevents dictionary history from accumulating.
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
          echo "Pushed to gh-pages — GitHub Pages will rebuild https://$(cat CNAME)/"

  full-dictionary-artifact:
    name: Build full ECDICT dictionary artifact
    # Build on dictionary-runtime implementation/audit PRs, their merge commits, or a manual refresh.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        (github.head_ref == 'feat/full-dictionary-runtime' ||
         github.head_ref == 'fix/post-merge-full-dictionary-audit')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' &&
        (contains(github.event.head_commit.message, 'full 770k dictionary runtime') ||
         contains(github.event.head_commit.message, 'full dictionary runtime after merge audit')))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dictionary packaging dependency
        run: python -m pip install --upgrade zstandard

      - name: Download ECDICT source
        run: |
          set -euo pipefail
          mkdir -p data/sources
          curl --fail --location --retry 5 --retry-all-errors \
            --output data/sources/ecdict.csv \
            https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.csv
          test -s data/sources/ecdict.csv

      - name: Build and enrich the complete dictionary
        run: |
          set -euo pipefail
          python scripts/build_dictionary.py \
            --source data/sources/ecdict.csv \
            --output data/dictionary.sqlite \
            --report data/dictionary-report.json
          python scripts/augment_dictionary_wordnet.py \
            --database data/dictionary.sqlite
          python scripts/augment_dictionary_opted.py \
            --database data/dictionary.sqlite
          python scripts/import_ap_stem_dictionary.py \
            --db data/dictionary.sqlite

      - name: Validate full database and search index
        run: |
          set -euo pipefail
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          path = Path("data/dictionary.sqlite")
          with sqlite3.connect(f"file:{path}?mode=ro", uri=True) as conn:
              quick_check = conn.execute("PRAGMA quick_check").fetchone()[0]
              rows = conn.execute("SELECT count(*) FROM dictionary_entries").fetchone()[0]
              fts_rows = conn.execute("SELECT count(*) FROM dictionary_search_fts").fetchone()[0]
              stem_rows = conn.execute(
                  "SELECT count(*) FROM dictionary_entries "
                  "WHERE tag LIKE '%k12_%' OR tag LIKE '%ap_%'"
              ).fetchone()[0]
          if quick_check != "ok":
              raise SystemExit(f"SQLite quick_check failed: {quick_check}")
          if rows < 700_000:
              raise SystemExit(f"Expected at least 700,000 dictionary rows, got {rows}")
          if fts_rows != rows:
              raise SystemExit(f"FTS row mismatch: entries={rows}, fts={fts_rows}")
          if stem_rows < 1:
              raise SystemExit("K-12/AP STEM enrichment is missing")
          print(f"Validated full dictionary: {rows:,} rows, {fts_rows:,} FTS rows, {stem_rows:,} STEM-tagged rows")
          PY

      - name: Package raw SQLite, zstd, and web shard variants
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).full.${GITHUB_RUN_NUMBER}"
          mkdir -p full-dictionary
          python scripts/package_dictionary_web.py \
            --input data/dictionary.sqlite \
            --output-dir full-dictionary \
            --version "$VERSION" \
            --zstd-level 9 \
            --copy-sqlite
          cp data/dictionary-report.json full-dictionary/
          cp data/wordnet-augmentation-report.json full-dictionary/
          cp data/opted-augmentation-report.json full-dictionary/
          sqlite3 data/dictionary.sqlite "PRAGMA quick_check; SELECT count(*) FROM dictionary_entries;" \
            > full-dictionary/validation.txt
          python scripts/package_dictionary_shards.py \
            --input data/dictionary.sqlite \
            --output-dir full-dictionary-web \
            --version "$VERSION.sharded" \
            --shard-count 128 \
            --gzip-level 9
          python scripts/validate_dictionary_shards.py full-dictionary-web

      - name: Upload full dictionary bundle
        uses: actions/upload-artifact@v4
        with:
          name: wordfan-full-dictionary-${{ github.run_number }}
          path: full-dictionary/
          compression-level: 0
          retention-days: 30
          if-no-files-found: error

      - name: Upload deployable sharded dictionary
        uses: actions/upload-artifact@v4
        with:
          name: wordfan-full-dictionary-web-${{ github.run_number }}
          path: full-dictionary-web/
          compression-level: 0
          retention-days: 30
          if-no-files-found: error

  publish-full-dictionary:
    name: Publish sharded full dictionary to GitHub Pages
    needs: [full-dictionary-artifact, deploy]
    if: >-
      always() &&
      needs.full-dictionary-artifact.result == 'success' &&
      needs.deploy.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wordfan-full-dictionary-web-${{ github.run_number }}
          path: dictionary-full

      - name: Overlay full dictionary onto published site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          git clone --depth=1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$SITE"
          rm -rf "$SITE/dictionary-full"
          cp -a dictionary-full "$SITE/dictionary-full"
          python scripts/validate_dictionary_shards.py "$SITE/dictionary-full"
          cd "$SITE"
          git add dictionary-full
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "Publish full dictionary from ${GITHUB_SHA:0:7}"
          git push origin gh-pages
