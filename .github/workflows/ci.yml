name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  static-checks:
    name: JS syntax + cache-version lockstep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check shell JavaScript
        working-directory: apps/wordlover-pwa
        run: node scripts/check-js-syntax.mjs

      - name: Run deterministic Youdao provider tests
        working-directory: apps/wordlover-pwa
        run: node scripts/test-youdao-provider.mjs

      - name: Test secure Youdao gateway boundary
        working-directory: apps/youdao-gateway
        run: npm test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify cache-version lockstep
        run: python apps/wordlover-pwa/scripts/check_versions.py

      - name: Test dictionary build, package, and client code
        run: |
          python -m unittest discover -s scripts/tests -p 'test_*.py'
          node apps/wordlover-pwa/scripts/test-full-dictionary.mjs

      - name: Check symbol map is up to date
        run: |
          set -euo pipefail
          changed="$(git diff --name-only HEAD^1 HEAD)"
          if [ "$changed" = ".github/workflows/ci.yml" ]; then
            echo "Only the CI workflow changed; no symbol-bearing source changed."
            exit 0
          fi
          python scripts/generate_code_map.py --check

      - name: Validate public shell assets
        working-directory: apps/wordlover-pwa
        run: npm run validate:shell-assets

  youdao-live-smoke:
    name: Youdao public entry smoke (non-blocking)
    if: github.event_name == 'pull_request'
    continue-on-error: true
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check two fixed public entries with strict timeouts
        working-directory: apps/wordlover-pwa
        run: npm run test:youdao:live

  smoke:
    name: Browser and app-shell smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (Chromium + WebKit)
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright zstandard
          python -m playwright install --with-deps chromium webkit

      - name: Prepare lightweight CI dictionary
        run: python apps/wordlover-pwa/scripts/create-ci-dictionary.py --force

      - name: Serve the PWA over HTTP
        working-directory: apps/wordlover-pwa/public
        run: |
          python -m http.server 4173 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4173/ >/dev/null; then echo "server up"; break; fi
            sleep 1
          done

      - name: Run Chromium touch smoke test
        run: >
          python apps/wordlover-pwa/scripts/smoke-headless.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/smoke-report.json

      - name: Run WebKit touch smoke test
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("apps/wordlover-pwa/scripts/smoke-headless.py").read_text(encoding="utf-8")
          chromium_launch = "browser = p.chromium.launch(headless=True)"
          if chromium_launch not in source:
              raise SystemExit("smoke-headless.py launch line changed; update the WebKit CI adapter.")
          Path("/tmp/smoke-headless-webkit.py").write_text(
              source.replace(chromium_launch, "browser = p.webkit.launch(headless=True)", 1),
              encoding="utf-8",
          )
          PY
          python /tmp/smoke-headless-webkit.py \
            --base http://127.0.0.1:4173 \
            --report apps/wordlover-pwa/test-results/smoke-webkit-report.json

      - name: Run visible user flows in Chromium and WebKit
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import time
          from pathlib import Path

          from playwright.sync_api import Page, sync_playwright

          BASE = "http://127.0.0.1:4173"
          ARTIFACTS = Path("apps/wordlover-pwa/test-results/user-flows")
          ARTIFACTS.mkdir(parents=True, exist_ok=True)

          def dismiss_modal(page: Page) -> None:
              # JS-dispatch the button clicks: headless WebKit intermittently flags the
              # static modal buttons as "not stable" and times out on click(), even though
              # the synchronous handler removes the overlay immediately.
              for _ in range(8):
                  overlay = page.locator(".modal-overlay")
                  if not overlay.count() or not overlay.first.is_visible():
                      return
                  passphrase = page.locator(".modal-overlay #passphrase")
                  cancel = page.locator(".modal-overlay [data-modal-cancel]")
                  if passphrase.count():
                      passphrase.fill("wordlover-localhost-development-passphrase")
                      page.evaluate("() => document.querySelector('.modal-overlay [data-modal-submit]')?.click()")
                  elif cancel.count():
                      page.evaluate("() => document.querySelector('.modal-overlay [data-modal-cancel]')?.click()")
                  else:
                      page.keyboard.press("Escape")
                  page.wait_for_timeout(200)

          def wait_for_ready(page: Page) -> None:
              last_error = None
              for _ in range(3):
                  try:
                      page.wait_for_load_state("domcontentloaded", timeout=15_000)
                      page.wait_for_function("window.WordLoverApp != null", timeout=15_000)
                      dismiss_modal(page)
                      # Let the app's own online auto-load bring the dictionary up. Calling
                      # ensureDictionaryLoaded() here races init()'s setSearchLoading toggle:
                      # if our load resolves while init is still awaiting (slower on headless
                      # WebKit), init's later setSearchLoading(true) lands after our load and
                      # the loaded=true early-return never re-enables the controls, leaving
                      # #clearSearch stuck disabled.
                      page.wait_for_function(
                          "window.WordLoverApp?.getState?.().loaded === true",
                          timeout=60_000,
                      )
                      dismiss_modal(page)
                      page.locator("#termInput").wait_for(state="visible", timeout=10_000)
                      # Search controls stay disabled while the dictionary loads; wait until
                      # the app re-enables them before driving the search flow.
                      page.locator("#clearSearch:not([disabled])").wait_for(state="attached", timeout=10_000)
                      return
                  except Exception as exc:  # navigation can occur when a service worker takes control
                      last_error = exc
                      page.wait_for_timeout(500)
              raise last_error

          def run_case(playwright, browser_name: str, mobile: bool) -> dict:
              label = f"{browser_name}-{'iphone' if mobile else 'desktop'}"
              browser_type = getattr(playwright, browser_name)
              browser = browser_type.launch(headless=True)
              context_args = {
                  "viewport": {"width": 390, "height": 844} if mobile else {"width": 1280, "height": 900},
                  "has_touch": mobile,
                  "is_mobile": mobile,
              }
              if mobile:
                  context_args["user_agent"] = (
                      "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) "
                      "AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 "
                      "Mobile/15E148 Safari/604.1"
                  )
              context = browser.new_context(**context_args)
              context.tracing.start(screenshots=True, snapshots=True, sources=True)
              page = context.new_page()
              console_errors: list[str] = []
              page_errors: list[str] = []
              page.on(
                  "console",
                  lambda message: console_errors.append(message.text)
                  if message.type == "error"
                  else None,
              )
              page.on("pageerror", lambda error: page_errors.append(str(error)))
              trace_path = ARTIFACTS / f"{label}-trace.zip"
              screenshot_path = ARTIFACTS / f"{label}.png"
              report = {"browser": browser_name, "profile": "iphone" if mobile else "desktop"}
              try:
                  page.goto(
                      f"{BASE}/?fresh=ci-visible-{label}-{int(time.time())}",
                      wait_until="domcontentloaded",
                  )
                  wait_for_ready(page)

                  search = page.locator("#termInput")
                  search.fill("abandon")
                  page.wait_for_function(
                      """() => {
                          const text = document.querySelector("#result")?.textContent?.toLowerCase() ?? "";
                          return text.includes("abandon") && !text.includes("invalid input");
                      }""",
                      timeout=15_000,
                  )
                  report["searchResult"] = page.locator("#result").inner_text()[:500]

                  # Phase 1 Youdao is a real, source-labelled, same-page link and must not
                  # mutate local learning data merely by rendering.
                  youdao_link = page.locator('#result .online-dictionary-link')
                  youdao_link.wait_for(state="visible", timeout=5_000)
                  href = youdao_link.get_attribute("href") or ""
                  if "m.youdao.com/dict" not in href or "q=abandon" not in href:
                      raise AssertionError(f"Unexpected Youdao URL: {href}")
                  if youdao_link.get_attribute("target") is not None:
                      raise AssertionError("Youdao Phase 1 link must use normal same-page navigation.")
                  if "Source: Youdao" not in page.locator('#result .online-dictionary-actions').inner_text():
                      raise AssertionError("Youdao action is missing visible source attribution.")
                  before_youdao = page.evaluate(
                      """() => ({
                          vocabulary: window.WordLoverApp.getVocabulary().length,
                          events: window.WordLoverApp.getStudyEvents().length,
                      })"""
                  )

                  page.locator("#appMenuButton").click()
                  page.locator("#appMenu").wait_for(state="visible", timeout=5_000)
                  page.locator("#onlineDictionaryMode").select_option("off")
                  page.locator("#appMenuBack").click()
                  page.locator("#appMenu").wait_for(state="hidden", timeout=5_000)
                  if page.locator('#result .online-dictionary-actions').count():
                      raise AssertionError("Off mode should hide the Youdao action.")
                  after_youdao = page.evaluate(
                      """() => ({
                          vocabulary: window.WordLoverApp.getVocabulary().length,
                          events: window.WordLoverApp.getStudyEvents().length,
                      })"""
                  )
                  if after_youdao != before_youdao:
                      raise AssertionError(f"Rendering/toggling Youdao mutated study data: {before_youdao} -> {after_youdao}")
                  report["youdaoPhase1"] = {
                      "href": href,
                      "samePage": True,
                      "offModeHidden": True,
                      "studyDataUnchanged": True,
                  }

                  # Restore the default experimental mode before continuing the shared flow.
                  page.locator("#appMenuButton").click()
                  page.locator("#appMenu").wait_for(state="visible", timeout=5_000)
                  page.locator("#onlineDictionaryMode").select_option("manual")
                  page.locator("#appMenuBack").click()
                  page.locator("#appMenu").wait_for(state="hidden", timeout=5_000)

                  # Verify Return-to-save separately. The default action intentionally clears
                  # the input/result after saving, so waiting for rendered text after pressing
                  # Return races that clear (fast Chromium used to fail intermittently).
                  search.press("Enter")
                  page.wait_for_function(
                      """() => window.WordLoverApp.getVocabulary()
                          .some((item) => item.normalizedTerm === "abandon")""",
                      timeout=15_000,
                  )

                  if search.input_value() != "":
                      page.locator("#clearSearch").click()
                  if search.input_value() != "":
                      raise AssertionError("Clear search did not empty the search field.")

                  page.locator("#appMenuButton").click()
                  page.locator("#appMenu").wait_for(state="visible", timeout=5_000)
                  page.locator("#themeSelect").select_option("ink")
                  page.wait_for_function(
                      "document.documentElement.dataset.theme === 'ink'",
                      timeout=5_000,
                  )

                  page.locator("#appMenuBack").click()
                  page.locator("#appMenu").wait_for(state="hidden", timeout=5_000)

                  page.locator("#studyOneMoreFilterButton").click()
                  page.locator("#studyOneMoreFilterPopup").wait_for(state="visible", timeout=5_000)
                  page.locator("#filterIncludeFreqMin").fill("1")
                  page.locator("#filterIncludeFreqMax").fill("5000")
                  page.locator("#studyOneMoreFilterClose").click()
                  page.locator("#studyOneMoreFilterPopup").wait_for(state="hidden", timeout=5_000)

                  # Spelling Study One More: switch the Today tab to Spelling and verify the
                  # spelling-specific Study one more + Filter controls take over from Memorize.
                  page.locator('#todayTrackTabs button[data-today-track="spelling"]').click()
                  page.locator("#studyNewSpellingWord").wait_for(state="visible", timeout=5_000)
                  if page.locator("#studyNewWord").is_visible():
                      raise AssertionError("Memorize Study one more should be hidden on the Spelling tab.")

                  page.locator("#spellingStudyOneMoreFilterButton").click()
                  page.locator("#studyOneMoreFilterPopup").wait_for(state="visible", timeout=5_000)
                  if page.locator("#spellingStudyOneMoreFilterButton").get_attribute("aria-expanded") != "true":
                      raise AssertionError("Spelling Filter button should be aria-expanded when its popup is open.")
                  if page.locator("#studyOneMoreFilterButton").get_attribute("aria-expanded") == "true":
                      raise AssertionError("Memorize and Spelling Filter buttons must not both be expanded.")
                  page.locator("#filterIncludeFreqMax").fill("5000")
                  page.locator("#studyOneMoreFilterClose").click()
                  page.locator("#studyOneMoreFilterPopup").wait_for(state="hidden", timeout=5_000)

                  def spelling_one_more_terms():
                      return page.evaluate(
                          """() => {
                              const snap = window.WordLoverApp.buildUserDataSnapshot();
                              const spelling = (snap.spellingItems ?? []);
                              const vocab = new Set((snap.vocabularyItems ?? []).map((i) => i.normalizedTerm));
                              const fromOneMore = spelling.filter((i) => i.lastSaveReason === "spelling-study-one-more");
                              const terms = spelling.map((i) => i.normalizedTerm);
                              return {
                                  added: fromOneMore.map((i) => i.normalizedTerm),
                                  duplicates: terms.length !== new Set(terms).size,
                                  leakedToVocab: fromOneMore.some((i) => vocab.has(i.normalizedTerm)),
                              };
                          }"""
                      )

                  page.locator("#studyNewSpellingWord").click()
                  page.locator("#spellingInput").wait_for(state="visible", timeout=15_000)
                  first = spelling_one_more_terms()
                  if len(first["added"]) != 1:
                      raise AssertionError(f"Expected exactly one spelling-study-one-more record, got {first}")
                  if first["leakedToVocab"]:
                      raise AssertionError("Spelling Study One More must not add the word to the Memorize list.")
                  report["spellingStudyOneMore"] = first

                  # The Study one more session must be marked to auto-advance on completion.
                  first_session = page.evaluate("() => window.WordLoverApp.spelling.state()")
                  first_term = (first_session or {}).get("currentTerm")
                  if not first_session or first_session.get("source") != "spelling-study-one-more" or not first_session.get("autoNext"):
                      raise AssertionError(f"Spelling Study one more session not marked auto-continuing: {first_session}")

                  # First-try correct must auto-advance to a NEW word WITHOUT a second button click.
                  page.evaluate(f"() => window.WordLoverApp.spelling.answer({first_term!r})")
                  page.wait_for_function(
                      """(prev) => {
                          const s = window.WordLoverApp.spelling.state();
                          return s && s.currentTerm && s.currentTerm !== prev;
                      }""",
                      arg=first_term,
                      timeout=15_000,
                  )
                  second = spelling_one_more_terms()
                  if len(second["added"]) != 2:
                      raise AssertionError(f"Auto-advance should add a second spelling-study-one-more record, got {second}")
                  if second["duplicates"]:
                      raise AssertionError(f"Duplicate spelling records created: {second}")
                  if second["leakedToVocab"]:
                      raise AssertionError("Spelling Study One More must not add words to the Memorize list.")
                  report["spellingStudyOneMoreAutoAdvance"] = second

                  page.locator("#spellingInput").wait_for(state="visible", timeout=15_000)
                  page.evaluate("() => window.WordLoverApp.spelling.close()")

                  # Return to the Memorize tab so the layout/overflow check matches the default view.
                  page.locator('#todayTrackTabs button[data-today-track="vocabulary"]').click()
                  page.locator("#studyNewWord").wait_for(state="visible", timeout=5_000)

                  overflow = page.evaluate(
                      """() => ({
                          viewportWidth: window.innerWidth,
                          documentWidth: document.documentElement.scrollWidth,
                          bodyWidth: document.body.scrollWidth,
                      })"""
                  )
                  report["layout"] = overflow
                  if max(overflow["documentWidth"], overflow["bodyWidth"]) > overflow["viewportWidth"] + 2:
                      raise AssertionError(f"Horizontal overflow detected: {overflow}")

                  page.screenshot(path=str(screenshot_path), full_page=True)
                  report["consoleErrors"] = console_errors
                  report["pageErrors"] = page_errors
                  if page_errors:
                      raise AssertionError(f"Uncaught page errors: {page_errors}")
                  return report
              except Exception as exc:
                  page.screenshot(path=str(screenshot_path), full_page=True)
                  report["error"] = str(exc)
                  report["consoleErrors"] = console_errors
                  report["pageErrors"] = page_errors
                  raise
              finally:
                  context.tracing.stop(path=str(trace_path))
                  context.close()
                  browser.close()
                  (ARTIFACTS / f"{label}-report.json").write_text(
                      json.dumps(report, indent=2, ensure_ascii=False),
                      encoding="utf-8",
                  )

          results = []
          failures = []
          with sync_playwright() as playwright:
              for browser_name, mobile in (("chromium", False), ("webkit", True)):
                  try:
                      results.append(run_case(playwright, browser_name, mobile))
                  except Exception as exc:
                      failures.append(
                          {
                              "browser": browser_name,
                              "profile": "iphone" if mobile else "desktop",
                              "error": str(exc),
                          }
                      )

          summary = {"results": results, "failures": failures}
          (ARTIFACTS / "summary.json").write_text(
              json.dumps(summary, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          if failures:
              raise SystemExit(1)
          PY

      - name: Run browser automated suite
        run: >
          python apps/wordlover-pwa/scripts/run-browser-tests.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/browser-report.json

      - name: Run full dictionary browser smoke
        run: >
          python apps/wordlover-pwa/scripts/smoke-full-dictionary.py
          --base http://127.0.0.1:4173
          --report apps/wordlover-pwa/test-results/full-dictionary-report.json

      - name: Run offline / cold-start regression suite
        run: python apps/wordlover-pwa/scripts/smoke-offline-dictionary.py http://127.0.0.1:4173

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: apps/wordlover-pwa/test-results/
          if-no-files-found: ignore

  upgrade-regression:
    name: Real PWA N-1 to N upgrade regression
    needs: static-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install playwright && python -m playwright install --with-deps chromium
      - run: python apps/wordlover-pwa/scripts/smoke-pwa-upgrade.py --report apps/wordlover-pwa/test-results/pwa-upgrade-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pwa-upgrade-results
          path: apps/wordlover-pwa/test-results/pwa-upgrade-report.json
          if-no-files-found: warn

  deploy:
    name: Deploy to GitHub Pages (gh-pages)
    needs: [static-checks, smoke, upgrade-regression]
    # Only after checks pass, only for main (push or manual re-deploy).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.release.outputs.app_version }}
      build_id: ${{ steps.release.outputs.build_id }}
      commit: ${{ steps.release.outputs.commit }}
      shell_cache: ${{ steps.release.outputs.shell_cache }}
      asset_version: ${{ steps.release.outputs.asset_version }}
      gh_pages_commit: ${{ steps.publish.outputs.gh_pages_commit }}
    concurrency:
      group: deploy-wordfan-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (shell from main + dictionary carried from gh-pages)
        run: |
          set -euo pipefail
          SRC=apps/wordlover-pwa/public
          SITE="$RUNNER_TEMP/site"
          rm -rf "$SITE"; mkdir -p "$SITE"

          # Web shell only — drop dev launchers, build scripts, docs and certs.
          rsync -a \
            --exclude='*.ps1' --exclude='*.py' --exclude='*.md' \
            --exclude='*.pem' --exclude='*.cer' --exclude='certs/' \
            "$SRC"/ "$SITE"/

          # The ~32 MB ranked core dictionary is gitignored on main and lives on gh-pages.
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git show origin/gh-pages:dictionary.sqlite     > "$SITE/dictionary.sqlite"
          git show origin/gh-pages:dictionary.sqlite.zst > "$SITE/dictionary.sqlite.zst"

          # Preserve and revalidate the separately-published sharded full dictionary.
          if git ls-tree -d --name-only origin/gh-pages dictionary-full | grep -q '^dictionary-full$'; then
            git archive origin/gh-pages dictionary-full | tar -x -C "$SITE"
            python scripts/validate_dictionary_shards.py "$SITE/dictionary-full"
          fi

          # Preserve the separately-published selectable Kaikki runtime package.
          # It is generated outside normal CI and must survive orphan shell deploys.
          if git ls-tree -d --name-only origin/gh-pages kaikki | grep -q '^kaikki$'; then
            git archive origin/gh-pages kaikki | tar -x -C "$SITE"
            test -f "$SITE/kaikki/dictionary-manifest.json"
            test -f "$SITE/kaikki/dictionary.sqlite"
            test -f "$SITE/kaikki/dictionary-full/manifest.json"
            python scripts/validate_dictionary_shards.py "$SITE/kaikki/dictionary-full"
            for key in sqlite zstd; do
              file=$(jq -r ".$key.path // empty" "$SITE/kaikki/dictionary-manifest.json")
              [ -z "$file" ] && continue
              want=$(jq -r ".$key.sha256" "$SITE/kaikki/dictionary-manifest.json")
              got=$(sha256sum "$SITE/kaikki/$file" | cut -d' ' -f1)
              test "$want" = "$got"
            done
            echo "Preserved and validated existing /kaikki/ runtime package."
          else
            echo "No Kaikki package found on gh-pages; rollback-safe switching keeps ECDICT active."
          fi

          # GitHub Pages config.
          tr -d '\n' < CNAME > "$SITE/CNAME"
          : > "$SITE/.nojekyll"

      - name: Verify carried dictionary matches the manifest on main
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          MAN="$SITE/dictionary-manifest.json"
          for key in sqlite zstd; do
            file=$(jq -r ".$key.path"   "$MAN")
            want=$(jq -r ".$key.sha256" "$MAN")
            got=$(sha256sum "$SITE/$file" | cut -d' ' -f1)
            if [ "$want" != "$got" ]; then
              echo "::error::$file sha256 mismatch: manifest on main expects $want, dictionary on gh-pages is $got."
              echo "The dictionary content changed but CI cannot rebuild the ranked core set."
              echo "Publish the new binary once from the Windows box, then re-push:"
              echo "  powershell -File apps/wordlover-pwa/scripts/deploy-github-pages.ps1"
              exit 1
            fi
          done
          echo "Dictionary matches manifest ($(jq -r .dictionaryDataVersion "$MAN"))."

      - name: Stamp and validate canonical release identity
        id: release
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          STAMP="$(date -u +%Y%m%d-%H%M)-${GITHUB_SHA:0:7}"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          META="$(node apps/wordlover-pwa/scripts/validate-release-artifact.mjs "$SITE" "commit=$GITHUB_SHA" "buildId=$STAMP" "publishedAt=$PUBLISHED_AT")"
          echo "$META" | jq .
          echo "app_version=$(echo "$META" | jq -r .appVersion)" >> "$GITHUB_OUTPUT"
          echo "build_id=$(echo "$META" | jq -r .buildId)" >> "$GITHUB_OUTPUT"
          echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "shell_cache=$(echo "$META" | jq -r .shellCache)" >> "$GITHUB_OUTPUT"
          echo "asset_version=$(echo "$META" | jq -r .assetVersion)" >> "$GITHUB_OUTPUT"

      - name: Publish to gh-pages
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          cd "$SITE"
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Deploy WordFan from ${GITHUB_SHA:0:7}"
          echo "gh_pages_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # Single orphan commit (force) prevents dictionary history from accumulating.
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
          echo "Pushed to gh-pages — GitHub Pages will rebuild https://$(cat CNAME)/"

  verify-live-release:
    name: Verify live WordFan release
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ always() && needs.deploy.result == 'success' }}
    concurrency:
      group: deploy-wordfan-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Verify gh-pages branch release identity
        run: |
          set -euo pipefail
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          test "$(git rev-parse origin/gh-pages)" = "${{ needs.deploy.outputs.gh_pages_commit }}"
          test "$(git show origin/gh-pages:release.json | jq -r .commit)" = "${{ needs.deploy.outputs.commit }}"
      - name: Poll custom domain and validate critical live assets
        run: |
          python apps/wordlover-pwa/scripts/verify-live-release.py \
            --commit "${{ needs.deploy.outputs.commit }}" \
            --app-version "${{ needs.deploy.outputs.app_version }}" \
            --build-id "${{ needs.deploy.outputs.build_id }}" \
            --shell-cache "${{ needs.deploy.outputs.shell_cache }}" \
            --asset-version "${{ needs.deploy.outputs.asset_version }}" \
            --report apps/wordlover-pwa/test-results/deployment-verification.json
      - name: Upload deployment verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-verification
          path: apps/wordlover-pwa/test-results/deployment-verification.json
          if-no-files-found: warn

  full-dictionary-artifact:
    name: Build full ECDICT dictionary artifact
    # Build on dictionary-runtime implementation/audit PRs, their merge commits, or a manual refresh.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        (github.head_ref == 'feat/full-dictionary-runtime' ||
         github.head_ref == 'fix/post-merge-full-dictionary-audit')) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' &&
        (contains(github.event.head_commit.message, 'full 770k dictionary runtime') ||
         contains(github.event.head_commit.message, 'full dictionary runtime after merge audit')))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dictionary packaging dependency
        run: python -m pip install --upgrade zstandard

      - name: Download ECDICT source
        run: |
          set -euo pipefail
          mkdir -p data/sources
          curl --fail --location --retry 5 --retry-all-errors \
            --output data/sources/ecdict.csv \
            https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.csv
          test -s data/sources/ecdict.csv

      - name: Build and enrich the complete dictionary
        run: |
          set -euo pipefail
          python scripts/build_dictionary.py \
            --source data/sources/ecdict.csv \
            --output data/dictionary.sqlite \
            --report data/dictionary-report.json
          python scripts/augment_dictionary_wordnet.py \
            --database data/dictionary.sqlite
          python scripts/augment_dictionary_opted.py \
            --database data/dictionary.sqlite
          python scripts/import_ap_stem_dictionary.py \
            --db data/dictionary.sqlite

      - name: Validate full database and search index
        run: |
          set -euo pipefail
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          path = Path("data/dictionary.sqlite")
          with sqlite3.connect(f"file:{path}?mode=ro", uri=True) as conn:
              quick_check = conn.execute("PRAGMA quick_check").fetchone()[0]
              rows = conn.execute("SELECT count(*) FROM dictionary_entries").fetchone()[0]
              fts_rows = conn.execute("SELECT count(*) FROM dictionary_search_fts").fetchone()[0]
              stem_rows = conn.execute(
                  "SELECT count(*) FROM dictionary_entries "
                  "WHERE tag LIKE '%k12_%' OR tag LIKE '%ap_%'"
              ).fetchone()[0]
          if quick_check != "ok":
              raise SystemExit(f"SQLite quick_check failed: {quick_check}")
          if rows < 700_000:
              raise SystemExit(f"Expected at least 700,000 dictionary rows, got {rows}")
          if fts_rows != rows:
              raise SystemExit(f"FTS row mismatch: entries={rows}, fts={fts_rows}")
          if stem_rows < 1:
              raise SystemExit("K-12/AP STEM enrichment is missing")
          print(f"Validated full dictionary: {rows:,} rows, {fts_rows:,} FTS rows, {stem_rows:,} STEM-tagged rows")
          PY

      - name: Package raw SQLite, zstd, and web shard variants
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).full.${GITHUB_RUN_NUMBER}"
          mkdir -p full-dictionary
          python scripts/package_dictionary_web.py \
            --input data/dictionary.sqlite \
            --output-dir full-dictionary \
            --version "$VERSION" \
            --zstd-level 9 \
            --copy-sqlite
          cp data/dictionary-report.json full-dictionary/
          cp data/wordnet-augmentation-report.json full-dictionary/
          cp data/opted-augmentation-report.json full-dictionary/
          sqlite3 data/dictionary.sqlite "PRAGMA quick_check; SELECT count(*) FROM dictionary_entries;" \
            > full-dictionary/validation.txt
          python scripts/package_dictionary_shards.py \
            --input data/dictionary.sqlite \
            --output-dir full-dictionary-web \
            --version "$VERSION.sharded" \
            --shard-count 128 \
            --gzip-level 9
          python scripts/validate_dictionary_shards.py full-dictionary-web

      - name: Upload full dictionary bundle
        uses: actions/upload-artifact@v4
        with:
          name: wordfan-full-dictionary-${{ github.run_number }}
          path: full-dictionary/
          compression-level: 0
          retention-days: 30
          if-no-files-found: error

      - name: Upload deployable sharded dictionary
        uses: actions/upload-artifact@v4
        with:
          name: wordfan-full-dictionary-web-${{ github.run_number }}
          path: full-dictionary-web/
          compression-level: 0
          retention-days: 30
          if-no-files-found: error

  publish-full-dictionary:
    name: Publish sharded full dictionary to GitHub Pages
    needs: [full-dictionary-artifact, deploy]
    if: >-
      always() &&
      needs.full-dictionary-artifact.result == 'success' &&
      needs.deploy.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wordfan-full-dictionary-web-${{ github.run_number }}
          path: dictionary-full

      - name: Overlay full dictionary onto published site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          git clone --depth=1 --branch gh-pages \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$SITE"
          rm -rf "$SITE/dictionary-full"
          cp -a dictionary-full "$SITE/dictionary-full"
          python scripts/validate_dictionary_shards.py "$SITE/dictionary-full"
          cd "$SITE"
          git add dictionary-full
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -m "Publish full dictionary from ${GITHUB_SHA:0:7}"
          git push origin gh-pages
